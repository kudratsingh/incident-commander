name: evals

on:
  pull_request:
    branches: [main]
    paths:
      - "src/incident_commander/agent/**"
      - "src/incident_commander/tools/**"
      - "evals/graders/**"
      - "evals/runner.py"
      - "evals/scenarios/**"
      - "evals/reports/baseline.json"
      - ".github/workflows/evals.yml"

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-regression:
    name: eval regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.28"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: make eval-reg
        run: make eval-reg

# Alembic config. URL is supplied by DATABASE_URL at runtime (see alembic/env.py).

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# Placeholder — env.py overrides with DATABASE_URL. Kept non-empty so
# `alembic check` and offline commands don't complain about a missing URL.
sqlalchemy.url = postgresql+psycopg://placeholder/placeholder


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

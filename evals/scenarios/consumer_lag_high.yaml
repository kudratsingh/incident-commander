# Baseline eval scenario: severe Kafka consumer lag on the billing group.
# Agent probes get_consumer_lag once, then escalates with the finding.

name: consumer_lag_high
description: >
  Kafka consumer lag on the billing group crosses the paging threshold.
  For Phase 0 (read-only), the agent runs one probe and escalates to a human
  with the finding attached.

tags: [read-only, phase-0, kafka]

alert:
  source: platform.kafka
  severity: high
  fingerprint: consumer_lag_high
  group: billing-consumer

canned_tool_responses:
  get_consumer_lag:
    content:
      - type: text
        text: '{"group":"billing-consumer","lag":10000,"timestamp":"2026-07-16T12:00:00Z"}'
    is_error: false

canned_llm_responses:
  investigation_planner:
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.55
          reasoning: >
            Paging severity on billing consumer suggests the consumer is falling
            behind. Need to check the current lag value to confirm.
      next_action:
        kind: probe
        tool_name: get_consumer_lag
        arguments:
          group: billing-consumer
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.88
          reasoning: >
            Lag reading of 10000 messages confirms the billing consumer is
            severely backlogged.
      next_action:
        kind: stop
        reason: >
          Confidence sufficient for handoff; no other read tools would refine
          the diagnosis.
  briefing_writer:
    - findings: >
        The billing-consumer Kafka group has a lag of 10000 messages, consistent
        with the paging alert. The consumer is behind its input rate.
      recommendation: >
        Verify the billing-consumer pod is running and check whether processing
        time per message has increased in the last 10 minutes.
  briefing_judge:
    - groundedness: 0.9
      actionability: 0.85
      reasoning: >
        Findings quote the billing-consumer lag reading directly from the trail;
        recommendation names two concrete verification steps a human can perform
        in minutes.

expectation:
  name: consumer_lag_high
  expected_terminal_state: escalated
  expected_evidence_contains:
    - billing-consumer
    - lag
  max_tool_calls: 5

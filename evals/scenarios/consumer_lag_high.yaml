# Baseline eval scenario: consumer lag on the worker-dispatcher group.
# First scenario running against the real platform.

name: consumer_lag_high
description: >
  Kafka consumer lag alert on the worker-dispatcher group. Only group the
  platform exposes today (Wave 1); more arrive with later waves.
  For Phase 0 (read-only), the agent runs one probe and escalates.

tags: [read-only, phase-0, kafka, live-mcp]

use_live_mcp: true

alert:
  source: platform.kafka
  severity: high
  fingerprint: consumer_lag_high
  consumer_group: worker-dispatcher

canned_llm_responses:
  investigation_planner:
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.55
          reasoning: >
            Paging severity on worker-dispatcher suggests the consumer is
            falling behind. Probe for the current lag.
      next_action:
        kind: probe
        tool_name: get_consumer_lag
        arguments:
          consumer_group: worker-dispatcher
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.7
          reasoning: >
            Platform returned the live lag reading; whether it's a spike or
            sustained is not knowable from one point without another tool.
      next_action:
        kind: stop
        reason: >
          Only one read tool available today; escalate the live reading to a
          human for judgment.
  briefing_writer:
    - findings: >
        Live lag reading for the worker-dispatcher Kafka group was fetched
        from the platform via get_consumer_lag.
      recommendation: >
        Compare the lag reading against the paging threshold and check the
        worker process's recent CPU / restart history before intervening.
  briefing_judge:
    - groundedness: 0.85
      actionability: 0.8
      reasoning: >
        Findings ground in the live tool response; recommendation names two
        concrete verification steps.

expectation:
  name: consumer_lag_high
  expected_terminal_state: escalated
  expected_evidence_contains:
    - worker-dispatcher
  max_tool_calls: 5

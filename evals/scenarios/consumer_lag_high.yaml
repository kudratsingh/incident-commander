# Baseline eval scenario: severe Kafka consumer lag on the billing group.
# Agent probes get_consumer_lag once, then escalates with the finding.
#
# Live-MCP: this scenario is the first one migrated off fixtures. Under
# `make eval` it's skipped when PLATFORM_MCP_URL is the offline placeholder;
# `make eval-live` (or `make demo`) runs it against the real platform.

name: consumer_lag_high
description: >
  Kafka consumer lag on the billing group crosses the paging threshold.
  For Phase 0 (read-only), the agent runs one probe and escalates to a human
  with the finding attached.

tags: [read-only, phase-0, kafka, live-mcp]

use_live_mcp: true

alert:
  source: platform.kafka
  severity: high
  fingerprint: consumer_lag_high
  group: billing-consumer

# canned_tool_responses intentionally omitted — planner probes the real
# platform's get_consumer_lag tool via the live MCP endpoint.

canned_llm_responses:
  investigation_planner:
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.55
          reasoning: >
            Paging severity on billing consumer suggests the consumer is falling
            behind. Need to check the current lag value to confirm.
      next_action:
        kind: probe
        tool_name: get_consumer_lag
        arguments:
          group: billing-consumer
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.88
          reasoning: >
            Live lag reading returned by the platform confirms the billing
            consumer is backlogged.
      next_action:
        kind: stop
        reason: >
          Confidence sufficient for handoff; no other read tools would refine
          the diagnosis.
  briefing_writer:
    - findings: >
        The billing-consumer Kafka group is reporting a non-trivial lag on the
        live platform, consistent with the paging alert.
      recommendation: >
        Verify the billing-consumer pod is running and check whether processing
        time per message has increased in the last 10 minutes.
  briefing_judge:
    - groundedness: 0.85
      actionability: 0.85
      reasoning: >
        Findings ground in the live lag reading; recommendation names two
        concrete verification steps.

expectation:
  name: consumer_lag_high
  expected_terminal_state: escalated
  expected_evidence_contains:
    - billing-consumer
  max_tool_calls: 5

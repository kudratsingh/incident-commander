# Info-severity noise — also filtered at TRIAGE.

name: noise_info_severity
description: >
  Info-level signal from a routine health probe. Should be filtered at TRIAGE
  without incurring a tool call.

tags: [read-only, phase-0, noise]

alert:
  source: platform.healthcheck
  severity: info
  fingerprint: health_ping
  group: unknown

canned_llm_responses:
  briefing_writer:
    - findings: >
        Info-level health_ping alert; not investigated.
      recommendation: >
        Verify the healthcheck fingerprint is expected to fire at info level
        and consider filtering at the ingress if it is not actionable.

expectation:
  name: noise_info_severity
  expected_terminal_state: escalated
  expected_evidence_contains:
    - "classified as escalated"
  max_tool_calls: 0

# Low-severity noise on the analytics group.

name: noise_low_analytics
description: >
  Low-severity signal on analytics-consumer that shouldn't consume the tool
  budget. Verifies TRIAGE noise filter is group-agnostic.

tags: [read-only, phase-0, noise, group-variation]

alert:
  source: platform.canary
  severity: low
  fingerprint: canary_blip
  group: analytics-consumer

canned_llm_responses:
  briefing_writer:
    - findings: >
        Low-severity canary_blip alert tagged to analytics-consumer; not
        investigated.
      recommendation: >
        Confirm the canary_blip fingerprint should not page on analytics; if it
        recurs within the noise window, tighten the alerting rule.
  briefing_judge:
    - groundedness: 0.9
      actionability: 0.75
      reasoning: >
        Findings mirror the noise-filter outcome; recommendation names the
        canary_blip fingerprint and a concrete alerting-rule action.

expectation:
  name: noise_low_analytics
  expected_terminal_state: escalated
  expected_evidence_contains:
    - "classified as escalated"
  max_tool_calls: 0

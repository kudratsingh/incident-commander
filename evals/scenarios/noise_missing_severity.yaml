# Alert with no severity field — defaults to "unknown", TRIAGE filters as noise.

name: noise_missing_severity
description: >
  Malformed alert missing the severity field. Should default to "unknown" and
  be filtered at TRIAGE — treats missing signals defensively.

tags: [read-only, phase-0, noise, defensive]

alert:
  source: platform.unknown
  fingerprint: no_severity

canned_llm_responses:
  briefing_writer:
    - findings: >
        Alert arrived without a severity field. Treated as unknown/noise and
        not investigated.
      recommendation: >
        Ask the alert source to include a severity field; malformed alerts
        cannot be triaged safely.

expectation:
  name: noise_missing_severity
  expected_terminal_state: escalated
  expected_evidence_contains:
    - "classified as escalated"
  max_tool_calls: 0

# Actionable alert with no canned tool response — MCP error path escalates.

name: tool_missing_response
description: >
  Actionable alert but the fake platform has no canned response for the tool.
  Exercises the MCPError escalation path: the transition catches -32601
  (method not found), records the reason, and escalates.

tags: [read-only, phase-0, tool-error]

alert:
  source: platform.kafka
  severity: high
  fingerprint: consumer_lag_high
  group: payments-consumer

# No canned_tool_responses on purpose.

canned_llm_responses:
  investigation_planner:
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.5
          reasoning: >
            Paging alert on payments-consumer; check current lag reading.
      next_action:
        kind: probe
        tool_name: get_consumer_lag
        arguments:
          consumer_group: payments-consumer
  briefing_writer:
    - findings: >
        Attempted probe against get_consumer_lag failed at the transport layer;
        the platform has no response configured for this tool in this scenario.
      recommendation: >
        Escalate to the platform-tooling team; the tool surface is missing a
        response path for payments-consumer.
  briefing_judge:
    - groundedness: 0.85
      actionability: 0.75
      reasoning: >
        Findings correctly attribute the failure to the transport layer;
        recommendation names the platform-tooling team as the concrete owner.

expectation:
  name: tool_missing_response
  expected_terminal_state: escalated
  expected_evidence_contains:
    - "tool error"
  max_tool_calls: 0

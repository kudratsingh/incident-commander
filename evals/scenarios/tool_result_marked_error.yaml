# Canned tool response has is_error=True — INVESTIGATING escalates without parsing.

name: tool_result_marked_error
description: >
  The platform's tool returns is_error=True (partial failure, degraded response).
  INVESTIGATING should treat this as an inconclusive probe and escalate rather
  than parsing garbage.

tags: [read-only, phase-0, tool-error]

alert:
  source: platform.kafka
  severity: high
  fingerprint: consumer_lag_high
  group: billing-consumer

canned_tool_responses:
  get_consumer_lag:
    content:
      - type: text
        text: 'partial failure querying kafka'
    is_error: true

canned_llm_responses:
  investigation_planner:
    - hypotheses:
        - name: consumer_saturation
          confidence: 0.5
          reasoning: >
            Need current lag to confirm; probing billing-consumer.
      next_action:
        kind: probe
        tool_name: get_consumer_lag
        arguments:
          consumer_group: billing-consumer
  briefing_writer:
    - findings: >
        The get_consumer_lag probe returned is_error=True from the platform
        side, so the lag reading is not trustworthy.
      recommendation: >
        Retry manually after the platform-side Kafka client recovers, or fall
        back to CloudWatch's consumer-lag metric for a second reading.
  briefing_judge:
    - groundedness: 0.85
      actionability: 0.85
      reasoning: >
        Findings quote the is_error=True response accurately; recommendation
        offers two concrete fallback steps (manual retry + CloudWatch metric).

expectation:
  name: tool_result_marked_error
  expected_terminal_state: escalated
  expected_evidence_contains:
    - "is_error=True"
  max_tool_calls: 0
